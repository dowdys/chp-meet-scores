appId: com.dowdysarvis.chp-meet-scores
productName: Gymnastics Meet Scores
copyright: Copyright (C) 2026 Dowdy Sarvis

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

extraResources:
  - from: python/
    to: python/
    filter:
      - "**/*.py"
      - "**/*.exe"
      - "process_meet"
  - from: skills/
    to: skills/
    filter:
      - "**/*.md"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.png
  category: public.app-category.business
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  title: "Gymnastics Meet Scores"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Gymnastics Meet Scores

publish:
  provider: github
  owner: dowdys
  repo: chp-meet-scores
  releaseType: release
