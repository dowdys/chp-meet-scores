name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Delete any existing release for this tag (manual or stale) so we start clean.
          # This prevents the "empty published release" problem where a manual release
          # coexists with the CI draft and the manual one has no assets.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --draft --title "$TAG" --notes "Release $TAG"

  build-windows:
    needs: [create-release]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyinstaller pymupdf "qrcode[pil]"

      - name: Build process_meet.exe
        run: python -m PyInstaller --onefile --name process_meet --add-data "python/core/templates;templates" python/process_meet.py --distpath dist/pyinstaller --workpath build/pyinstaller -y

      - name: Copy process_meet.exe to python/
        run: Copy-Item -Path "dist/pyinstaller/process_meet.exe" -Destination "python/process_meet.exe" -Force

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build app (webpack)
        env:
          UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}
        run: npm run build

      - name: Clean stale Windows assets (for re-runs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for asset in $(gh release view "$TAG" --json assets --jq ".assets[].name" 2>/dev/null | grep -i -e "Setup" -e "latest.yml" -e ".exe"); do
            echo "Deleting stale asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
          done

      - name: Build and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always

  build-python-macos-x64:
    runs-on: macos-15-large
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyinstaller pymupdf "qrcode[pil]"

      - name: Build process_meet (x64)
        run: python -m PyInstaller --onefile --name process_meet --add-data "python/core/templates:templates" python/process_meet.py --distpath dist/pyinstaller --workpath build/pyinstaller -y

      - name: Upload x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: process_meet-x64
          path: dist/pyinstaller/process_meet

  build-python-macos-arm64:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyinstaller pymupdf "qrcode[pil]"

      - name: Build process_meet (arm64)
        run: python -m PyInstaller --onefile --name process_meet --add-data "python/core/templates:templates" python/process_meet.py --distpath dist/pyinstaller --workpath build/pyinstaller -y

      - name: Upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: process_meet-arm64
          path: dist/pyinstaller/process_meet

  build-macos:
    needs: [create-release, build-python-macos-x64, build-python-macos-arm64]
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download x64 binary
        uses: actions/download-artifact@v4
        with:
          name: process_meet-x64
          path: artifacts/x64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: process_meet-arm64
          path: artifacts/arm64

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build app (webpack)
        env:
          UPDATER_TOKEN: ${{ secrets.UPDATER_TOKEN }}
        run: npm run build

      # Build arm64 DMG with arm64 process_meet binary
      - name: Place arm64 binary
        run: |
          cp artifacts/arm64/process_meet python/process_meet
          chmod +x python/process_meet
          file python/process_meet

      - name: Clean stale arm64 assets (for re-runs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for asset in $(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | grep -i 'arm64'); do
            echo "Deleting stale asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
          done

      - name: Build and publish arm64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --arm64 --publish always

      # Unmount any leftover DMG volumes from the arm64 build to avoid conflicts
      - name: Clean up DMG volumes
        run: |
          hdiutil detach "/Volumes/Gymnastics Meet Scores" 2>/dev/null || true
          sleep 2

      # Build x64 DMG with x64 process_meet binary
      - name: Place x64 binary
        run: |
          cp artifacts/x64/process_meet python/process_meet
          chmod +x python/process_meet
          file python/process_meet

      - name: Clean stale x64 mac assets (for re-runs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          for asset in $(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | grep -iv 'arm64' | grep -i -e '\.dmg' -e 'mac\.zip' -e 'latest-mac'); do
            echo "Deleting stale asset: $asset"
            gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
          done

      - name: Build and publish x64 DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --publish always

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Verify critical assets exist before publishing
          ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length')
          if [ "$ASSET_COUNT" -lt 3 ]; then
            echo "ERROR: Only $ASSET_COUNT assets found — expected at least latest.yml + .exe + .dmg"
            echo "Assets present:"
            gh release view "$TAG" --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "Verified $ASSET_COUNT assets. Publishing release..."
          gh release edit "$TAG" --draft=false
